# ============================================================
# CampusFlow — Application Configuration
# ============================================================

spring.application.name=campusflow-backend
server.port=8080

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# 'update' = Hibernate creates/alters tables to match entities automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- OAuth2 Google ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:688684914452-olfslbslpg04vva6rtj81a5ttpc2frs5.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/oauth2/callback/google

# --- JWT ---
app.jwt.secret=${JWT_SECRET:CampusFlowHubVeryLongSecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLong2024}
app.jwt.expiration-ms=86400000

# --- OAuth2 redirect (where frontend receives the JWT token) ---
app.oauth2.authorized-redirect-uris=http://localhost:5173/oauth2/redirect

# --- Super Admin ---
app.super-admin.email=ayeshsenadheera7@gmail.com

# --- Cloudinary (image uploads — optional) ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# --- File upload limits ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173

# --- Logging ---
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# --- Error detail ---
server.error.include-message=always
