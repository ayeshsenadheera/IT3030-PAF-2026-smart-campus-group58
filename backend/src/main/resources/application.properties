spring.application.name=campusflow-backend
server.port=8080
spring.profiles.default=dev

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- OAuth2 Google ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/oauth2/callback/google

# --- OAuth2 Microsoft (Azure AD / SLIIT) ---
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.redirect-uri=http://localhost:8080/oauth2/callback/microsoft
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.client-name=Microsoft

spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys

# --- JWT ---
app.jwt.secret=${JWT_SECRET:dev-only-change-me}
app.jwt.expiration-ms=86400000

# --- OAuth2 redirect (where frontend receives the JWT token) ---
app.oauth2.authorized-redirect-uris=http://localhost:5173/oauth2/redirect

# --- Frontend URL (used in password reset emails) ---
app.frontend-url=http://localhost:5173

# --- Super Admin ---
app.super-admin.email=${SUPER_ADMIN_EMAIL:}

# --- Mail (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Cloudinary (image uploads) ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# --- File upload limits ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173

# --- Logging ---
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# --- Error detail ---
server.error.include-message=always
server.error.include-stacktrace=never
